version: '3.9'

services:
  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - ai-incident-net
    restart: unless-stopped

  # ── Backend (Node.js/Express) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - FRONTEND_URL=http://localhost:3000
      - AI_SERVICE_URL=http://ai-service:8000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=mongodb://mongodb:27017/incidents
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SKIP_AUTH=true
    depends_on:
      - mongodb
      - redis
      - ai-service
    networks:
      - ai-incident-net
    restart: unless-stopped
    volumes:
      - ./backend/logs:/app/logs

  # ── AI Service (Python/FastAPI) ───────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-openai-api-key}
      - GROQ_API_KEY=${GROQ_API_KEY:-your-groq-api-key}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-your-pinecone-key}
      - PINECONE_ENV=${PINECONE_ENV:-us-east-1}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=mongodb://mongodb:27017/incidents
    depends_on:
      - mongodb
      - redis
    networks:
      - ai-incident-net
    restart: unless-stopped

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-incident-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ai-incident-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - ai-incident-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - ai-incident-net
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ai-incident-net:
    driver: bridge
